services:
  rdgen:
    container_name: rdgen
    image: bryangerlach/rdgen:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SECRET_KEY: "${SECRET_KEY}"
      GHUSER: "${GHUSER}"
      GHBEARER: "${GHBEARER}"
      GENURL: "${GENURL}"
      ZIP_PASSWORD: "${ZIP_PASSWORD}"
      GHBRANCH: "${GHBRANCH:-master}"
      PROTOCOL: "${PROTOCOL:-https}"
      REPONAME: "${REPONAME:-rdgen}"
    ports:
      - "${RDGEN_PORT:-8001}:8000"
    volumes:
      - ./db.sqlite3:/opt/rdgen/db.sqlite3
      - ./exe:/opt/rdgen/exe
      - ./png:/opt/rdgen/png
      - ./media:/opt/rdgen/media
      - ./temp_zips:/opt/rdgen/temp_zips
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3)\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    dns:
      - 8.8.8.8
